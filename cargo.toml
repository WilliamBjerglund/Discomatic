[package]
name = "dice-roll"
version = "0.1.0"
edition = "2024"

[dependencies]
poise = "0.6.2"
rand = "0.10.1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal"] }
dotenvy = "0.15"
regex = "1.7.1"
colored = "3.1.1"
serde_json = "1.0.150"
serde = { version = "1.0.228", features = ["derive"] }
sqlx = { version = "0.9.0", features = ["sqlite", "runtime-tokio"] }
